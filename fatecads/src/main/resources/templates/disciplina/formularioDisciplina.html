<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/app.css?v=cloud-20260518">
    <title>Cadastro de Disciplinas</title>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">ADS</span>
                <span>Sistema Fatec ADS</span>
            </a>
            <nav class="nav" aria-label="Navegacao principal">
                <a href="/alunos/listar">Alunos</a>
                <a href="/curso/listar">Cursos</a>
                <a href="/professor/listar">Professores</a>
                <a href="/disciplina/listar" aria-current="page">Disciplinas</a>
                <a href="/usuario/listar">Usuarios</a>
            </nav>
        </header>

        <section class="page-header">
            <div>
                <p class="eyebrow">Modulo academico</p>
                <h1 class="page-title">Cadastro de disciplina</h1>
                <p class="page-subtitle">Informe nome, sigla e carga horaria da disciplina.</p>
            </div>
        </section>

        <form class="panel form-panel" th:action="@{/disciplina/salvar}" method="post" th:object="${disciplina}">
            <input type="hidden" th:field="*{idDisciplina}">
            <div class="form-grid">
                <div class="field">
                    <label for="nomeDisciplina">Nome</label>
                    <input id="nomeDisciplina" type="text" th:field="*{nomeDisciplina}" required>
                </div>
                <div class="field">
                    <label for="siglaDisciplina">Sigla</label>
                    <input id="siglaDisciplina" type="text" th:field="*{siglaDisciplina}" required>
                </div>
                <div class="field">
                    <label for="cargaHorariaDisciplina">Carga horaria</label>
                    <input id="cargaHorariaDisciplina" type="number" th:field="*{cargaHorariaDisciplina}" min="1" required>
                </div>
                <div class="field">
                    <label for="professor">Professor</label>
                    <select id="professor" th:field="*{professor}" required>
                        <option value="">Selecione um professor</option>
                        <option th:each="professor : ${professores}"
                                th:value="${professor.idProfessor}"
                                th:text="${professor.nomeProfessor}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button class="button button-primary" type="submit">Salvar</button>
                <a class="button" href="/disciplina/listar">Voltar</a>
            </div>
        </form>
    </main>
</body>
</html>
