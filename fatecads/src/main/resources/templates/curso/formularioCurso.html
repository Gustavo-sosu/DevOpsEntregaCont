<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/app.css?v=cloud-20260518">
    <title>Cadastro de Curso</title>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">ADS</span>
                <span>Sistema Fatec ADS</span>
            </a>
            <nav class="nav" aria-label="Navegacao principal">
                <a href="/alunos/listar">Alunos</a>
                <a href="/curso/listar" aria-current="page">Cursos</a>
                <a href="/professor/listar">Professores</a>
                <a href="/disciplina/listar">Disciplinas</a>
                <a href="/usuario/listar">Usuarios</a>
            </nav>
        </header>

        <section class="page-header">
            <div>
                <p class="eyebrow">Modulo academico</p>
                <h1 class="page-title">Cadastro de curso</h1>
                <p class="page-subtitle">Informe o nome, periodo e carga horaria do curso.</p>
            </div>
        </section>

        <form class="panel form-panel" th:action="@{/curso/salvar}" th:object="${curso}" method="post">
            <input type="hidden" th:field="*{idCurso}">
            <div class="form-grid">
                <div class="field">
                    <label for="nomeCurso">Nome</label>
                    <input type="text" id="nomeCurso" th:field="*{nomeCurso}" required>
                </div>
                <div class="field">
                    <label for="periodo">Periodo</label>
                    <input type="text" id="periodo" th:field="*{periodo}" required>
                </div>
                <div class="field">
                    <label for="cargaHoraria">Carga horaria</label>
                    <input type="number" id="cargaHoraria" th:field="*{cargaHoraria}" min="1" required>
                </div>
                <div class="field">
                    <label for="disciplina">Disciplina</label>
                    <select id="disciplina" th:field="*{disciplina}" required>
                        <option value="">Selecione uma disciplina</option>
                        <option th:each="disciplina : ${disciplinas}"
                                th:value="${disciplina.idDisciplina}"
                                th:text="${disciplina.nomeDisciplina}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button class="button button-primary" type="submit">Salvar</button>
                <a class="button" href="/curso/listar">Voltar</a>
            </div>
        </form>
    </main>
</body>
</html>
