<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Cursos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Gerenciar Cursos</h1>
            <p>Veja e gerencie todos os cursos cadastrados no sistema.</p>
            <a href="/cursos/criar" class="btn btn-primary">Novo Curso</a>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Período</th>
                            <th>Carga Horária</th>
                            <th class="actions">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="curso : ${cursos}">
                            <td th:text="${curso.nomeCurso}"></td>
                            <td th:text="${curso.periodo}"></td>
                            <td th:text="${curso.cargaHoraria}"></td>
                            <td class="actions">
                                <a th:href="@{/cursos/editar/{id}(id=${curso.idCurso})}" class="btn btn-secondary">Editar</a>
                                <a th:href="@{/cursos/excluir/{id}(id=${curso.idCurso})}" class="btn btn-danger" onclick="return confirm('Deseja realmente excluir este curso?')">Excluir</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
