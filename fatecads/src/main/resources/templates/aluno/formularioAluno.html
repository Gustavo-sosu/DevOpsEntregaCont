<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${aluno.idAluno != null} ? 'Editar Aluno' : 'Cadastrar Aluno'">Cadastrar Aluno</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 th:text="${aluno.idAluno != null} ? 'Editar Aluno' : 'Cadastrar Aluno'">Cadastrar Aluno</h1>
            <p>Preencha os dados do aluno abaixo.</p>
            <form th:action="@{/alunos/salvar}" method="post" th:object="${aluno}">
                <input type="hidden" th:field="*{idAluno}">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" th:field="*{nomeAluno}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{emailAluno}">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" th:field="*{telefoneAluno}" required>
                </div>
                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" th:field="*{enderecoAluno}">
                </div>
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" th:field="*{cpfAluno}" required>
                </div>
                <div class="form-group">
                    <label>RA</label>
                    <input type="text" th:field="*{raAluno}" required>
                </div>
                <div class="form-group">
                    <label>Curso</label>
                    <select th:field="*{curso}">
                        <option value="" disabled selected>Selecione um curso</option>
                        <option th:each="curso : ${cursos}"
                                th:text="${curso.nomeCurso}"
                                th:value="${curso.idCurso}">
                        </option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px;">
                    <input type="submit" value="Salvar">
                    <a href="/alunos/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
